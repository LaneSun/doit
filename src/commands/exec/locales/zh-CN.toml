[exec]
skill = """
为命令包装出有界、可控的输出。在内层 PTY 中运行,颜色与格式与真实终端一致。

用法：
  doit exec -- <命令> [参数...]               # 捕获 + 截断(头尾)
  doit exec --no-truncate -- <命令> [参数...]  # 捕获,不截断
  doit exec --raw -- <命令> [参数...]          # 交互/TUI 程序(vim、top):直通,仅给摘要

参数：
  --no-truncate       - 禁用输出截断
  --raw               - 直接继承终端;用于交互式/全屏程序
  --truncate-chars N  - 头尾最大字符数（默认：2000）
  --truncate-lines N  - 头尾最大行数（默认：50）

输出：
  常规模式缓冲输出,打印头尾并在中间插入截断提示,完整输出落盘到日志文件。
  raw 模式让程序在终端上实时运行,结束后返回一行摘要。

场景：
  当你需要有界输出或运行交互/TUI 程序时使用 exec。普通命令可直接执行,无需 exec。
"""

truncated_notice = "已截断:省略 %{omitted} 行,完整输出:%{path}"
fullscreen_summary = "交互式程序已运行(全屏)"
raw_summary = "交互式程序已运行"
