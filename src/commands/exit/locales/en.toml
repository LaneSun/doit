[exit]
skill = """
Complete the current task and exit.

Usage:
  doit exit '<summary>'
  doit exit <<'EOF'
multiline summary line 1
multiline summary line 2
EOF

Output:
  (none)

Scenario:
  The LLM calls exit to end the session: when the task is complete (run/task
  mode) or when the interactive conversation is finished. The summary, if any,
  is shown to the user.
"""
