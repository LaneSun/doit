[edit]
skill = """
结构化文件编辑。三种互斥模式：

1. 行号替换：
   doit edit --lines N:M '<文件>' <<'EOF'
   <新内容>
   EOF

2. 正则替换：
   doit edit --regex '<模式>' --replace '<替换文本>' '<文件>'

3. Git diff 格式（固定 heredoc，上下文 >= 3 行）：
   doit edit '<文件>' <<'DIFF'
   @@ -10,6 +10,8 @@
    上下文行（不变）
   -删除的行
   +新增的行
    更多上下文
   DIFF

输出：
  编辑完成后，以 search 风格输出变更区域及周围上下文：
  '<文件>:<行号>: <内容>'

场景：
  LLM 使用 edit 进行精确的结构化修改。
  Diff 模式仅匹配唯一位置（拒绝模糊匹配）。
"""
