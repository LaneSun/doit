[prompt]
not_available = "doit prompt is only available in interactive mode"
skill = """
Ask the user a question and block until they reply.

Usage:
  doit prompt '<message>'

The message is printed to the user, then a '> ' prompt waits for one line of
input. The reply is returned as the command result.

Scenario:
  In interactive mode you normally just reply with plain text (no tool call) to
  talk to the user; that is automatically turned into a prompt. Call doit prompt
  explicitly when you want to ask a question in the middle of a command sequence.
  Only meaningful in interactive mode.
"""
